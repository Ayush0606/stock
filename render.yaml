services:
  - type: web
    name: stock-dashboard-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite:///./stock_data.db
      - key: FRONTEND_URL
        value: https://stock-dashboard.onrender.com
    disk:
      name: stock-data
      mountPath: /app
      sizeGB: 1

  - type: static
    name: stock-dashboard-frontend
    staticPublicPath: dist
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://stock-dashboard-backend.onrender.com/api
