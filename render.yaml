services:
  - type: web
    name: stock-dashboard-backend
    runtime: python
    pythonVersion: 3.10
    buildCommand: cd backend && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./stock_data.db
      - key: ALLOWED_HOSTS
        fromDatabase:
          name: stock_db
          property: host
    disk:
      name: stock-data
      mountPath: /app/backend
      sizeGB: 1

  - type: static
    name: stock-dashboard-frontend
    staticPublicPath: dist
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://stock-dashboard-backend.onrender.com/api
